roboteq_ros2_driver:
  ros__parameters:
    pub_odom_tf: true
    odom_frame: "odom"
    base_frame: "base_footprint"
    cmdvel_topic: "cmd_vel"
    odom_topic: "odom_roboteq"
    port: "/dev/ttyACM0"
    baud: 115200
    open_loop: false
    wheel_circumference: 0.0942
    track_width: 0.55
    encoder_ppr: 16384
    encoder_cpr: 65536
    # encoder_ppr: 1024
    # encoder_cpr: 4096
    max_amps: 5
    max_rpm: 5
